<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Add New Student</h2>
                        {% if error %}
                            <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="registration_number" class="form-label">Registration Number</label>
                                    <input type="text" class="form-control" id="registration_number" name="registration_number" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="first_name" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="first_name" name="first_name" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="other_names" class="form-label">Other Names</label>
                                    <input type="text" class="form-control" id="other_names" name="other_names" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone</label>
                                    <input type="text" class="form-control" id="phone" name="phone">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" name="address">
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="program" class="form-label">Program</label>
                                    <input type="text" class="form-control" id="program" name="program" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="semester" class="form-label">Semester</label>
                                    <input type="text" class="form-control" id="semester" name="semester" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="year" class="form-label">Year</label>
                                    <input type="number" class="form-control" id="year" name="year" min="1" max="4" required>
                                </div>
                            </div>
                            <div id="fee-container">
                                <div class="row fee-entry mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Fee Description</label>
                                        <input type="text" class="form-control" name="fee_description" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Amount (UGX)</label>
                                        <input type="number" step="0.01" class="form-control" name="fee_amount" required>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-secondary mb-3" onclick="addFee()">Add Another Fee</button>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Add Student</button>
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('financial_details') }}" class="btn btn-secondary">Back to Financial Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addFee() {
            const container = document.getElementById('fee-container');
            const newFee = document.createElement('div');
            newFee.className = 'row fee-entry mb-3';
            newFee.innerHTML = `
                <div class="col-md-6">
                    <input type="text" class="form-control" name="fee_description" required>
                </div>
                <div class="col-md-6">
                    <input type="number" step="0.01" class="form-control" name="fee_amount" required>
                </div>
            `;
            container.appendChild(newFee);
        }
    </script>
</body>
</html>
